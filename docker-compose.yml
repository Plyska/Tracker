# Docker-оркестрація монорепо Tracker.
# Зараз піднімається лише frontend (Vite dev-server).
# backend додамо пізніше окремим сервісом.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracker-frontend
    ports:
      - "5173:5173"
    volumes:
      # код монтуємо для hot-reload...
      - ./frontend:/app
      # ...але node_modules лишаємо з образу (anonymous volume), щоб не перетирати хостовими
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

