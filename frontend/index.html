<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker</title>
    <script>
      // Виставляємо тему/акцент до першого рендеру, щоб уникнути спалаху світлої теми (FOUC).
      // Формат — як у Redux-persist (app/store): значення зберігається напряму (напр. "dark"),
      // не обгорнуте в { state: ... } (так було у знятого zustand-persist).
      (function () {
        try {
          var stored = localStorage.getItem('tracker-theme');
          var theme = stored ? JSON.parse(stored) : null;
          if (theme !== 'light' && theme !== 'dark') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.toggle('dark', theme === 'dark');
          var accent = JSON.parse(localStorage.getItem('tracker-accent'));
          if (accent) document.documentElement.dataset.accent = accent;
        } catch (e) {
          /* localStorage недоступний/порожній — лишаємо дефолт (тема за prefers-color-scheme) */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
