# Автоматична перевірка/оновлення залежностей (Security-фаза).
# Dependabot щотижня відкриває PR на оновлення вразливих/застарілих пакетів.
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Патч/мінор — одним PR, щоб не плодити шум; мажор — окремими.
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
