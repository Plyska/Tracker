# Docker-оркестрація монорепо Tracker.
# frontend (Vite dev-server) + backend (Express API). БД — зовнішня (Neon), у compose не піднімається.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracker-frontend
    ports:
      - "5173:5173"
    volumes:
      # код монтуємо для hot-reload...
      - ./frontend:/app
      # ...але node_modules лишаємо з образу (anonymous volume), щоб не перетирати хостовими
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracker-backend
    ports:
      - "3000:3000"
    # Креди БД (Neon) + секрети — з backend/.env (не в репо).
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
